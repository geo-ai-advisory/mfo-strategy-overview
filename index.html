<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: #f5f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 40px 36px; max-width: 380px; width: 100%; text-align: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #0984e3; margin: 0 auto 20px; }
  h1 { font-family: 'Unbounded', sans-serif; font-size: 19px; font-weight: 600; color: #2d3436; margin-bottom: 8px; letter-spacing: -0.01em; }
  p.sub { font-size: 14px; color: #636e72; margin-bottom: 24px; line-height: 1.5; }
  input { width: 100%; background: #f8f9fa; border: 1px solid #dfe6e9; border-radius: 10px; padding: 13px 16px; font-size: 15px; color: #2d3436; font-family: inherit; margin-bottom: 12px; transition: border-color .15s; }
  input:focus { outline: none; border-color: #0984e3; }
  button { width: 100%; background: #0984e3; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .15s; }
  button:hover { background: #0770c2; box-shadow: 0 4px 12px rgba(9,132,227,.25); transform: translateY(-1px); }
  button:active { background: #065a9c; transform: translateY(1px); box-shadow: inset 0 2px 4px rgba(0,0,0,.15); }
  .err { color: #d63031; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #b2bec3; margin-bottom: 18px; }
</style>

function b64d(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: b64d(SALT), iterations: 100000, hash: 'SHA-256' }, keyMat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);

    const html = new TextDecoder().decode(pt);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const l = doc.createElement('link'); l.rel = 'stylesheet'; l.href = 'https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap';
    doc.head.insertBefore(l, doc.head.firstChild);
    document.open();
    document.write('<!DOCTYPE html>', doc.documentElement.outerHTML);
    document.close();
  } catch (ex) { err.textContent = 'Неверный пароль'; }
